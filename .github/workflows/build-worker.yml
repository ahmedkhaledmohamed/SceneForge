# Builds the RunPod worker image on GitHub's infra and pushes to GHCR.
# Datacenter-to-datacenter transfer — a residential uplink cannot push
# this ~11GB image reliably (GHCR 400s after hours of chunked upload).
name: Build worker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        default: "0.1"
        required: true
  push:
    branches: [main]
    paths: ["runpod-worker/**"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The PyTorch/CUDA image is ~25GB uncompressed; stock runners have
      # ~14GB free. Dropping preinstalled toolchains frees ~30GB more.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: runpod-worker
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sceneforge-worker:${{ inputs.tag || '0.1' }}
            ghcr.io/${{ github.repository_owner }}/sceneforge-worker:latest
